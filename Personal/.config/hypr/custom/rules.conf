# You can put custom rules here
# Window/layer rules: https://wiki.hyprland.org/Configuring/Window-Rules/
# Workspace rules: https://wiki.hyprland.org/Configuring/Workspace-Rules/

# Border colors
windowrule = match:pin 1 match:floating 1, border_color rgb(D9A2D0)
windowrule = match:fullscreen 1, border_color rgb(FFB454)
windowrule = match:fullscreen 1 match:floating 1, border_color rgb(FFB454)
windowrule = match:pin 0 match:floating 1, border_color rgb(349CCF)

# Group
windowrule = match:class .*, group set
windowrule = match:class ^(steam)$ match:title ^(Steam Big Picture Mode)$, fullscreen on
windowrule = match:class ^(steam_app_[0-9]+)$, group deny


# Apps
windowrule = match:class ^(org.telegram.desktop)$, workspace special
windowrule = match:class ^(v2rayN)$, workspace special
windowrule = match:class gephgui-wry, float on
windowrule = match:class ^(nvim)$, workspace 1
windowrule = match:class ^(dev.zed.Zed)$, workspace 1
windowrule = match:class ^(brave-browser)$, workspace 2
windowrule = match:class ^(zen)$, workspace 2
windowrule = match:class ^(steam_app_.*)$, fullscreen on
#windowrule = match:content 3, fullscreen on
windowrule = match:class ^()$ match:title ^(Steam - Self Updater)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float on
windowrule = match:class ^(zenity)$, float on
windowrule = match:class krunner, float on
windowrule = match:title Telegram, opacity 0.95
windowrule = match:title QQ, opacity 0.95
windowrule = match:class kitty, animation slide right
windowrule = match:class alacritty, animation slide right
windowrule = match:class ^(firefox)$, no_blur on
windowrule = match:class ^(waybar)$, no_blur on
windowrule = match:class blueman-manager, size 783 411

windowrule {
    name = amnezia
    match:class = ^(AmneziaVPN)$
    float = on
    group = deny
}
windowrule = match:class mpv, group deny
windowrule {
    name = mpv
    match:class = mpv
    group = deny
    float = on
    size = 960 540
}
windowrule {
    name = org.freedesktop.impl.portal.desktop.kde
    match:class = org.freedesktop.impl.portal.desktop.kde
    float = on
    size = 740 490
}
windowrule = match:class steam, group deny
windowrule {
    name = steam
    match:class = ^(steam)$
    group = deny
    suppress_event = fullscreen
}
windowrule {
    name = brave-file
    match:class = ^(brave-browser)$
    match:title = ^(Open File)$|^(Save File)$
    float = on
}
windowrule {
    name = winboat
    match:class = ^(winboat-.*)
    float = on
    group = deny
    border_size = 0
    fullscreen_state = 0 0
    rounding = 0
    no_shadow = on
}
windowrule {
    name = xdg-desktop-portal
    match:class = ^(xdg-desktop-portal-.*)$
    float = on
}
windowrule {
    name = imv
    match:class = imv
    float = on
    move = cursor_x-(window_w*0.25) cursor_y-(window_h*0.25)
    size = 960 540
}
windowrule = match:title ^(Picture-in-Picture)$, group deny
windowrule {
    name = picture-in-picture
    match:title = ^(Picture-in-Picture)$
    float = on
    size = 960 540
    move = 25% -
    pin = on
    group = deny
    suppress_event = activatefocus
    suppress_event = activatefocus
}
windowrule {
    name = termfloat
    match:class = termfloat
    float = on
    move = cursor_x-(window_w*0.25) cursor_y-(window_h*0.25)
    size = 960 540
    rounding = 5
}
windowrule {
    name = nemo
    match:class = nemo
    move = cursor_x-(window_w*0.25) cursor_y-(window_h*0.25)
    size = 960 540
    float = on
}
windowrule {
    name = ncmpcpp
    match:class = ncmpcpp
    float = on
    move = cursor_x-(window_w*0.25) cursor_y-(window_h*0.25)
    size = 960 540
}
windowrule {
    name = lucien
    match:class = ^(lucien)$
    no_blur = on
    border_size = 0
    no_shadow = on
}
